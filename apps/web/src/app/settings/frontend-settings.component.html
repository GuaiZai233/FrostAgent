<div class="page">
  <mat-toolbar >
    <a mat-icon-button routerLink="/settings" aria-label="Back to settings">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <span class="toolbar-title" i18n="@@frontendSettingsTitle">网页设置</span>
  </mat-toolbar>

  <section>
    <mat-form-field subscriptSizing="dynamic">
        <mat-label i18n="@@localeSelectPlaceholder">语言</mat-label>
      <mat-select
        i18n-placeholder="@@localeSelectPlaceholder"
        placeholder="选择语言"
        [ngModel]="currentLocale"
        (ngModelChange)="switchLocale($event)"
      >
        @for (option of localeOptions; track option.value) {
          <mat-option [value]="option.value">{{ option.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </section>

  <section >
    <h3 class="form-section-title" i18n="@@themeMode">主题</h3>
    
    <mat-button-toggle-group
      [ngModel]="themeService.currentMode()"
      (ngModelChange)="themeService.setMode($event)"
      hideSingleSelectionIndicator="true"
    >
      @for (option of themeOptions; track option.mode) {
        <mat-button-toggle [value]="option.mode">
          <mat-icon>{{ option.icon }}</mat-icon>
          <span>{{ option.label }}</span>
        </mat-button-toggle>
      }
    </mat-button-toggle-group>
  </section>

</div>
