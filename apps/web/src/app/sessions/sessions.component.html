<section >
  <header >
    <button mat-stroked-button type="button" (click)="refresh()">
      <mat-icon>refresh</mat-icon>
      <span i18n="@@refresh">刷新</span>
    </button>
  </header>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (error()) {
    <mat-card >
      <mat-card-content>{{ error() }}</mat-card-content>
    </mat-card>
  }

  <mat-card >
    <table mat-table [dataSource]="sessions()">
      <ng-container matColumnDef="sessionId">
        <th mat-header-cell *matHeaderCellDef i18n="@@sessionId">会话 ID</th>
        <td mat-cell *matCellDef="let session">{{ session.sessionId }}</td>
      </ng-container>

      <ng-container matColumnDef="platform">
        <th mat-header-cell *matHeaderCellDef i18n="@@platform">平台</th>
        <td mat-cell *matCellDef="let session">
          {{ formatPlatform(session.platform) }}
        </td>
      </ng-container>

      <ng-container matColumnDef="messageCount">
        <th mat-header-cell *matHeaderCellDef i18n="@@messageCount">消息数</th>
        <td mat-cell *matCellDef="let session">{{ session.messageCount }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef i18n="@@createdAt">创建时间</th>
        <td mat-cell *matCellDef="let session">
          {{ formatDateTime(session.createdAt) }}
        </td>
      </ng-container>

      <ng-container matColumnDef="lastActive">
        <th mat-header-cell *matHeaderCellDef i18n="@@lastActive">最后活跃</th>
        <td mat-cell *matCellDef="let session">
          {{ formatDateTime(session.lastActive) }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    @if (!loading() && sessions().length === 0) {
      <div  i18n="@@noSessions">暂无会话。</div>
    }

    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 20, 50, 100]"
      (page)="handlePageEvent($event)"
      aria-label="Select page"
    >
    </mat-paginator>
  </mat-card>
</section>
