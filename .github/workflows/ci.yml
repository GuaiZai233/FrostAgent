name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict GITHUB_TOKEN to read-only access for security
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be set up before setup-node can use its cache
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # buf compiles protobuf schemas into Go and TypeScript code as part of Makefile targets
      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@latest

      - name: Run checks
        run: make ci
